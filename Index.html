<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SPMB Poltekkes - Login</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="login-page">
    <div class="bg-health-pattern"></div>
    <div class="container fade-in">
        <div class="card glass-card">
            <div class="logo-area">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5c/Logo_Kementerian_Kesehatan_RI_2020.svg/120px-Logo_Kementerian_Kesehatan_RI_2020.svg.png" alt="Kemenkes Logo" class="kemenkes-logo">
                <h2>SPMB Poltekkes</h2>
                <p>Kementerian Kesehatan RI</p>
            </div>
            <h3>Masuk ke Akun</h3>
            <form id="loginForm">
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="loginEmail" placeholder="Email" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="loginPassword" placeholder="Password" required>
                </div>
                <button type="submit" class="btn-primary"><i class="fas fa-arrow-right-to-bracket"></i> Login</button>
            </form>
            <p class="toggle-link">Belum punya akun? <a href="#" id="goToRegister">Daftar Sekarang</a></p>
        </div>
    </div>
    <div id="notification" class="notification"></div>
    <script src="script.js"></script>
</body>
</html>
